name: Split and Copy APK

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'نسخه (مثال: v26.16)'
        required: true
        default: 'v26.16'

permissions:
  contents: write

jobs:
  split-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK from Release
        id: download
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.event.inputs.tag_name }}"
          
          echo "دریافت لینک دانلود..."
          DOWNLOAD_URL=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" \
            | grep -oP '"browser_download_url":\s*"\K[^"]+(?=")' | head -1)
          
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ لینک دانلود پیدا نشد"
            exit 1
          fi
          
          echo "شروع دانلود..."
          curl -L -o "app.apk" "$DOWNLOAD_URL"
          
          FILE_SIZE=$(stat -c%s "app.apk")
          echo "حجم: $FILE_SIZE بایت"
          
          if [ $FILE_SIZE -lt 1000000 ]; then
            echo "❌ حجم فایل خیلی کم است"
            exit 1
          fi

      - name: Split into 95MB parts
        run: |
          # حداکثر 95 مگابایت برای هر فایل
          MAX_SIZE=99614720  # 95 * 1024 * 1024
          FILE_SIZE=$(stat -c%s "app.apk")
          
          if [ $FILE_SIZE -le $MAX_SIZE ]; then
            echo "فایل کوچک است، نیازی به تقسیم نیست"
            cp app.apk "CodeOnTheGo-${{ github.event.inputs.tag_name }}.apk"
            echo "split_needed=false" >> $GITHUB_OUTPUT
          else
            echo "تقسیم فایل به چند پارت..."
            split -b 95m app.apk "CodeOnTheGo.part."
            echo "split_needed=true" >> $GITHUB_OUTPUT
            echo "پارت‌ها ساخته شدند"
          fi

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add CodeOnTheGo* 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "تغییری وجود ندارد"
          else
            git commit -m "Add APK files from ${{ github.event.inputs.tag_name }}"
            git push
            echo "✅ فایل‌ها ذخیره شدند"
          fi

      - name: Show links
        run: |
          echo "════════════════════════════════════"
          echo "✅ عملیات انجام شد"
          echo "لینک فایل‌ها:"
          echo "https://github.com/${{ github.repository }}/blob/main/"
          echo "════════════════════════════════════"
