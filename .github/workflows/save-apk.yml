name: Download, Split, Clean, and Deploy Latest APK (v26.18)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-apk-v26-18:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Clean old files
        run: |
          echo "🧹 پاک کردن فایل‌های قدیمی..."
          rm -f CodeOnTheGo*.apk CodeOnTheGo.part.* ASSEMBLE_GUIDE.md app.apk 2>/dev/null || true
          echo "✅ پاکسازی انجام شد"

      - name: Download version 26.18
        id: download
        run: |
          APK_URL="https://download.appdevforall.org/CodeOnTheGo-release26.18-armv8a.apk"
          echo "📥 در حال دانلود از $APK_URL"
          
          curl --fail --location \
               --connect-timeout 30 \
               --max-time 180 \
               --retry 3 \
               --retry-delay 5 \
               -o "app.apk" \
               "$APK_URL"
          
          if [ ! -f "app.apk" ]; then
            echo "❌ دانلود ناموفق"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "app.apk" 2>/dev/null || stat -f%z "app.apk" 2>/dev/null)
          echo "📊 حجم فایل: $FILE_SIZE بایت"
          
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "❌ حجم فایل خیلی کم است"
            exit 1
          fi
          
          echo "✅ دانلود موفق"
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_OUTPUT

      - name: Split APK (if needed)
        id: split
        run: |
          MAX_SIZE_BYTES=99614720
          FILE_SIZE=$(stat -c%s "app.apk")
          
          if [ $FILE_SIZE -le $MAX_SIZE_BYTES ]; then
            echo "فایل کوچک است (کمتر از 95MB)، نیازی به تقسیم نیست"
            cp app.apk "CodeOnTheGo-v26.18.apk"
            echo "SPLIT_NEEDED=false" >> $GITHUB_OUTPUT
          else
            echo "فایل بزرگ است، در حال تقسیم به پارت‌های 95MB..."
            split -b 95m app.apk "CodeOnTheGo.part."
            PART_COUNT=$(ls -1 CodeOnTheGo.part.* 2>/dev/null | wc -l)
            echo "✅ به $PART_COUNT پارت تقسیم شد"
            echo "SPLIT_NEEDED=true" >> $GITHUB_OUTPUT
          fi

      - name: Create assembly guide (if split)
        if: steps.split.outputs.SPLIT_NEEDED == 'true'
        run: |
          cat > ASSEMBLE_GUIDE.md << 'EOF'
# راهنمای اسمبل فایل APK

