name: Download, Split, and Save APK v26.18

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean old files
        run: |
          echo "🧹 پاک کردن فایل‌های قدیمی..."
          rm -f *.apk CodeOnTheGo.part.* 2>/dev/null || true
          echo "✅ پاکسازی انجام شد"

      - name: Download APK v26.18
        run: |
          echo "📥 دانلود فایل..."
          curl -L -o "app.apk" \
            "https://download.appdevforall.org/CodeOnTheGo-release26.18-armv8a.apk"
          
          FILE_SIZE=$(stat -c%s "app.apk")
          echo "📊 حجم فایل: $((FILE_SIZE / 1024 / 1024)) مگابایت"
          
          if [ $FILE_SIZE -lt 1000000 ]; then
            echo "❌ حجم فایل خیلی کم است"
            exit 1
          fi
          echo "✅ دانلود موفق"

      - name: Split APK (if needed)
        run: |
          FILE_SIZE=$(stat -c%s "app.apk")
          MAX_SIZE=$((95 * 1024 * 1024))
          
          if [ $FILE_SIZE -le $MAX_SIZE ]; then
            echo "📦 فایل کوچک است، کپی می‌شود..."
            cp app.apk "CodeOnTheGo-v26.18.apk"
          else
            echo "🔪 فایل بزرگ است، تقسیم می‌شود..."
            split -b 95m app.apk "CodeOnTheGo.part."
          fi

      - name: Commit and Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CodeOnTheGo-v26.18.apk 2>/dev/null || true
          git add CodeOnTheGo.part.* 2>/dev/null || true
          
          if git status --porcelain | grep -q .; then
            git commit -m "📦 اضافه کردن APK نسخه 26.18"
            git push origin HEAD:main
            echo "✅ آپلود انجام شد"
          else
            echo "⚠️ هیچ فایل جدیدی برای آپلود وجود ندارد"
            exit 1
          fi

      - name: Show links
        run: |
          echo "════════════════════════════════════════"
          echo "✅ عملیات انجام شد"
          echo ""
          echo "📥 لینک دانلود مستقیم:"
          if [ -f "CodeOnTheGo-v26.18.apk" ]; then
            echo "https://raw.githubusercontent.com/${{ github.repository }}/main/CodeOnTheGo-v26.18.apk"
          else
            for part in CodeOnTheGo.part.*; do
              echo "https://raw.githubusercontent.com/${{ github.repository }}/main/$part"
            done
          fi
          echo "════════════════════════════════════════"
