name: Fetch Code on the Go

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Download APK v26.16
        run: |
          curl -L -o "CodeOnTheGo-latest.apk" \
            "https://download.appdevforall.org/CodeOnTheGo-release26.16-armv8a.apk"
          
          # بررسی حجم فایل
          if [ $(stat -c%s "CodeOnTheGo-latest.apk") -lt 1000000 ]; then
            echo "❌ فایل خراب است یا حجمش کم است"
            exit 1
          fi
          echo "✅ دانلود موفق"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v26.16
          name: "Code on the Go - v26.16"
          files: CodeOnTheGo-latest.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
